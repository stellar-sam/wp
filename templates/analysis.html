<!DOCTYPE html>
<html>

<head>

<title>Stock Analysis</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="top-bar">
<button onclick="history.back()">⬅ Back</button>
<button onclick="location.href='/'">🏠 Home</button>
</div>

<div class="container">

<h1>Select Stock for Analysis</h1>

<div id="stockButtons" class="stock-button-container"></div>

<div id="analysisTable"></div>

<br>

<button onclick="goToCompare()" class="compare-btn">
Compare All Stocks
</button>

</div>

<script>

let data = JSON.parse(localStorage.getItem("stockData"))
let stocks = JSON.parse(localStorage.getItem("stockNames"))

let buttonContainer = document.getElementById("stockButtons")

stocks.forEach((name,index)=>{

buttonContainer.innerHTML += 
`<button onclick="showAnalysis(${index})">${name}</button>`

})

/* ---------- Normal Distribution Functions ---------- */

function normalCDF(x){
return (1 + erf(x / Math.sqrt(2))) / 2
}

function erf(x){

let sign = (x >= 0) ? 1 : -1
x = Math.abs(x)

let a1 = 0.254829592
let a2 = -0.284496736
let a3 = 1.421413741
let a4 = -1.453152027
let a5 = 1.061405429
let p = 0.3275911

let t = 1/(1+p*x)

let y = 1 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t*Math.exp(-x*x)

return sign*y

}

/* ---------- Analysis Function ---------- */

function showAnalysis(stockIndex){

let prices = data.map(row=>row[stockIndex])

let returns=[]

for(let i=1;i<prices.length;i++){

returns.push((prices[i]-prices[i-1])/prices[i-1])

}

let mean = returns.reduce((a,b)=>a+b,0)/returns.length

let variance = returns.reduce((sum,r)=>sum+Math.pow(r-mean,2),0)/returns.length

let std = Math.sqrt(variance)

/* ---------- Correct Risk Probability ---------- */

let z = (0 - mean) / std

let riskProb = normalCDF(z) * 100

riskProb = Math.max(0, Math.min(100, riskProb))

/* ---------- Table Display ---------- */

let table = `<h2>${stocks[stockIndex]}</h2>`

table += `<table class="stock-table">

<tr>
<th>Observation</th>
<th>Price</th>
<th>Return</th>
</tr>`

for(let i=0;i<prices.length;i++){

let ret = i==0 ? "-" : ((prices[i]-prices[i-1])/prices[i-1]).toFixed(4)

table += `<tr>
<td>${i+1}</td>
<td>${prices[i]}</td>
<td>${ret}</td>
</tr>`

}

table += `</table><br>`

table += `<table class="stock-table">

<tr><th>Metric</th><th>Value</th></tr>

<tr><td>Mean Return</td><td>${mean.toFixed(5)}</td></tr>
<tr><td>Variance</td><td>${variance.toFixed(5)}</td></tr>
<tr><td>Standard Deviation</td><td>${std.toFixed(5)}</td></tr>
<tr><td>Risk Probability (%)</td><td>${riskProb.toFixed(2)}</td></tr>

</table>`

document.getElementById("analysisTable").innerHTML = table

}

/* ---------- Compare Page Redirect ---------- */

function goToCompare(){
window.location.href="/compare-result"
}

</script>

</body>

</html>
