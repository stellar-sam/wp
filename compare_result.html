<!DOCTYPE html>
<html>
<head>
    <title>Stock Comparison</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar">
    <button onclick="history.back()">⬅ Back</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
</div>
<div class="container">
    <h1>Stock Comparison Result</h1>
    <div id="comparisonTable"></div>
    <h2 id="bestStock"></h2>
</div>

<script>
let data = JSON.parse(localStorage.getItem("stockData"));
let stocks = JSON.parse(localStorage.getItem("stockNames"));
let results = stocks.map((name, index) => {
    let prices = data.map(row => row[index]);
    let returns = [];
    for(let i=1; i<prices.length; i++){ returns.push((prices[i]-prices[i-1])/prices[i-1]); }
    let mean = returns.reduce((a,b)=>a+b,0)/returns.length;
    let std = Math.sqrt(returns.reduce((sum,r)=>sum+Math.pow(r-mean,2),0)/returns.length);
    return { name, mean, std, score: mean/std };
});

let best = results.reduce((a,b) => a.score > b.score ? a : b);
let table = `<table class="stock-table"><tr><th>Stock</th><th>Mean</th><th>Score</th></tr>`;
results.forEach(r => { table += `<tr><td>${r.name}</td><td>${r.mean.toFixed(5)}</td><td>${r.score.toFixed(5)}</td></tr>`; });
document.getElementById("comparisonTable").innerHTML = table + "</table>";
document.getElementById("bestStock").innerHTML = `🏆 Best: <b>${best.name}</b>`;
</script>
</body>
</html>
