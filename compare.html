<!DOCTYPE html>
<html>
<head>
    <title>Compare Stocks</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar">
    <button onclick="history.back()">⬅ Back</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
</div>
<div class="container">
    <h1>Stock Comparison</h1>
    <label>How many stocks do you want to compare?</label>
    <input type="number" id="numStocks" min="1" max="5">
    <button onclick="createInputs()">Enter Stocks</button>
    <div id="stockInputs"></div>
</div>

<script>
function createInputs(){
    let num = document.getElementById("numStocks").value;
    if(num > 5 || num < 1){
        alert("Please enter a valid number (1-5)");
        return;
    }
    let container = document.getElementById("stockInputs");
    container.innerHTML="";
    for(let i=1;i<=num;i++){
        container.innerHTML += `<input type="text" class="stockName" placeholder="Enter Stock ${i}">`;
    }
    container.innerHTML += `
        <h3>Observation Type</h3>
        <select><option>Hourly</option><option>Daily</option><option>Monthly</option></select>
        <br><br><button onclick="goToObservation()">Submit</button>`;
}

function goToObservation(){
    let stocks = [];
    document.querySelectorAll(".stockName").forEach(input => stocks.push(input.value));
    let obsType = document.querySelector("select").value;
    window.location.href = `observations.html?stocks=${stocks.join(",")}&type=${obsType}`;
}
</script>
</body>
</html>
