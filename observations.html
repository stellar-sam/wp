<!DOCTYPE html>
<html>
<head>
    <title>Stock Observations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-bar">
    <button onclick="history.back()">⬅ Back</button>
    <button onclick="location.href='index.html'">🏠 Home</button>
</div>
<div class="container">
    <h1>Enter Observation Data</h1>
    <label>Number of Observations</label>
    <input type="number" id="numObs" min="2">
    <button onclick="createObservationInputs()">Next</button>
    <div id="observationInputs"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const stockNames = params.get("stocks").split(",");
const obsType = params.get("type");

function createObservationInputs(){
    let obs = document.getElementById("numObs").value;
    let container = document.getElementById("observationInputs");
    let table = "<table class='stock-table'><tr><th>Observation</th>";
    stockNames.forEach(name => { table += `<th>${name}</th>`; });
    table += "</tr>";

    for(let i=1;i<=obs;i++){
        let label = `${obsType.replace('ly','')} ${i}`;
        table += `<tr><td>${label}</td>`;
        stockNames.forEach(() => { table += `<td><input type='number' step='any'></td>`; });
        table += "</tr>";
    }
    table += "</table><br><button onclick='processData()'>Analyze</button>";
    container.innerHTML = table;
}

function processData(){
    let rows = document.querySelectorAll(".stock-table tr:not(:first-child)");
    let data = Array.from(rows).map(row => 
        Array.from(row.querySelectorAll("input")).map(input => parseFloat(input.value))
    );
    localStorage.setItem("stockData", JSON.stringify(data));
    localStorage.setItem("stockNames", JSON.stringify(stockNames));
    window.location.href = "analysis.html";
}
</script>
</body>
</html>
